<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>웹소설 뷰어 - The Prepper</title>
    <meta name="description" content="웹소설 원고 열람 애플리케이션">
    <link rel="stylesheet" href="styles.css">
    
    <!-- Fonts: Pretendard for ultra-crisp display, and Google Fonts -->
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
    
    <!-- Marked.js for Markdown parsing -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
    <div class="app-container">
        <!-- Sidebar Navigation -->
        <nav class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <h2>The Prepper</h2>
                <p>Sows Seeds in a Fallen City</p>
            </div>
            <ul class="chapter-list" id="chapter-list">
                <!-- Chapters loaded dynamically via JS -->
            </ul>
        </nav>
        
        <!-- Main Content Area -->
        <main class="content-area">
            <header class="topbar">
                <button id="toggle-sidebar" class="icon-btn" aria-label="사이드바 토글">
                    <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="3" y1="12" x2="21" y2="12"></line>
                        <line x1="3" y1="6" x2="21" y2="6"></line>
                        <line x1="3" y1="18" x2="21" y2="18"></line>
                    </svg>
                </button>
                <div class="reader-controls">
                    <button id="theme-toggle" class="icon-btn" aria-label="테마 전환">
                        <svg viewBox="0 0 24 24" width="22" height="22" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
                        </svg>
                    </button>
                    <div class="divider"></div>
                    <button id="font-decrease" class="text-btn" aria-label="글자 크기 줄이기">A-</button>
                    <button id="font-increase" class="text-btn" aria-label="글자 크기 키우기">A+</button>
                </div>
            </header>
            
            <div class="reader-container" id="reader-container">
                <div class="text-content-wrapper">
                    <div id="content" class="markdown-body">
                        <div class="welcome-screen">
                            <div class="welcome-icon">📖</div>
                            <h1>원고 뷰어</h1>
                            <p>왼쪽 목차에서 에피소드를 선택하여 열람을 시작하세요.</p>
                            <p class="help-text">마크다운 형식을 자동으로 렌더링합니다.</p>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
